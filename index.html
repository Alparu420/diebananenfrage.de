<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Which Banana Would You Eat?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .bananas-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .banana-card {
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 15px;
            overflow: hidden;
            background: #f5f5f5;
            border: 3px solid transparent;
        }

        .banana-card:hover {
            transform: scale(1.1);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .banana-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        @media (max-width: 768px) {
            .bananas-grid {
                grid-template-columns: 1fr;
            }

            .banana-card img {
                height: 250px;
            }
        }

        .banana-card.voting {
            opacity: 0.6;
            pointer-events: none;
        }

        .success-message {
            display: none;
            background: #4caf50;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            position: fixed;
            top: 20px;
            right: 20px;
            animation: slideIn 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .redirect-message {
            display: none;
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="success-message" id="successMessage">
        ✓ Vote recorded! Redirecting to results...
    </div>

    <div class="container">
        <h1>🍌 Which Banana Would You Eat? 🍌</h1>
        <p style="margin-bottom: 30px; color: #666; font-size: 1.1em;">Click on your favorite banana to vote!</p>

        <div class="bananas-grid" id="bananasGrid"></div>

        <div style="text-align: center; margin-top: 30px;">
            <button onclick="window.location.href='/results.html'" style="background: #667eea; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 1em; cursor: pointer; font-weight: bold; margin: 0 10px;">📊 View Results</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Saving your vote...</p>
        </div>

        <div class="redirect-message" id="redirectMessage">
            Redirecting to results in <span id="countdown">3</span>s...
        </div>
    </div>

    <script>
        // Initialize banana grid
        function initializeBananas() {
            const grid = document.getElementById('bananasGrid');
            for (let i = 1; i <= 6; i++) {
                const card = document.createElement('div');
                card.className = 'banana-card';
                card.innerHTML = `
                    <img src="banane-${i}.png" alt="Banana ${i}">
                `;
                card.addEventListener('click', () => submitVote(i));
                grid.appendChild(card);
            }
        }

        // Submit vote
        async function submitVote(bananaId) {
            const loading = document.getElementById('loading');
            const successMessage = document.getElementById('successMessage');
            const redirectMessage = document.getElementById('redirectMessage');
            const grid = document.getElementById('bananasGrid');

            // Disable all cards
            grid.style.pointerEvents = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('/api/vote', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ banana_id: bananaId })
                });

                if (response.ok) {
                    loading.style.display = 'none';
                    successMessage.classList.add('show');
                    redirectMessage.style.display = 'block';

                    // Countdown before redirect
                    let seconds = 3;
                    const countdownInterval = setInterval(() => {
                        seconds--;
                        document.getElementById('countdown').textContent = seconds;
                        if (seconds <= 0) {
                            clearInterval(countdownInterval);
                            window.location.href = '/results.html';
                        }
                    }, 1000);
                } else {
                    alert('Error saving vote. Please try again.');
                    grid.style.pointerEvents = 'auto';
                    loading.style.display = 'none';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error saving vote. Please try again.');
                grid.style.pointerEvents = 'auto';
                loading.style.display = 'none';
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeBananas);
    </script>
</body>
</html>
